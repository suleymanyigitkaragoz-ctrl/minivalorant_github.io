<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Valorant</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  width: 100%;
  height: 100%;
}

/* UI */
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: Arial;
}

#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 10px;
  height: 10px;
  margin-left: -5px;
  margin-top: -5px;
  background: white;
}

/* Mobile joystick */
#joystick {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 150px;
  height: 150px;
}

/* Mobile skill buttons */
#skills {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.skill-btn {
  width: 60px;
  height: 60px;
  border-radius: 30px;
  background: rgba(255,255,255,0.3);
  color: white;
  font-size: 24px;
  display: flex;
  justify-content: center;
  align-items: center;
  user-select: none;
  touch-action: none;
}
</style>
</head>

<body>

<div id="ui">HP: <span id="hp">100</span></div>
<div id="crosshair"></div>
<div id="joystick"></div>

<div id="skills">
  <div class="skill-btn" id="fireball-btn">🔥</div>
  <div class="skill-btn" id="heal-btn">💚</div>
  <div class="skill-btn" id="ult-btn">💥</div>
</div>

<canvas id="renderCanvas"></canvas>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>
<script src="game.js"></script>

</body>
</html>
